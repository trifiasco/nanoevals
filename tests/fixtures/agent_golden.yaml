metadata:
  description: Test fixture
  version: 1.0.0
test_cases:
- expected_trajectory:
  - args:
      city: Tokyo
    match_mode: exact
    name: get_weather
  input: What is the weather in Tokyo?
  reference_output: The weather in Tokyo is 22°C and sunny.
  success_criteria:
  - mentions temperature
- expected_trajectory:
  - args:
      destination: Paris
    name: search_flights
  - args:
      flight_id: FL123
    name: book_flight
  input: Book a flight to Paris
  reference_output: Flight FL123 to Paris booked.
  success_criteria:
  - confirms booking
